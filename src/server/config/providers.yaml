version: 2

# Provider Preset Configuration
# fields array declares fields to be filled when adding
# key: 'name' | 'apiKey' | 'baseUrl' mapped directly to top-level fields, others saved in extra.<key>
# secret: true uses mask display in frontend
#
# modelsUrl: model list path relative to baseUrl, empty string means dynamic pulling not supported
# modelsAuthStyle: bearer → Authorization: Bearer <apiKey>
#                  x-api-key → x-api-key: <apiKey> + anthropic-version header
# modelsDataPath: record field name for models array in JSON response (almost always 'data')

presets:
  - id: official
    name: Claude Official
    baseUrl: ''
    apiFormat: anthropic
    needsApiKey: false
    websiteUrl: https://www.anthropic.com/claude-code
    modelsUrl: /v1/models
    modelsAuthStyle: x-api-key
    modelsDataPath: data
    fields:
      - key: name
        label: Provider Nickname
        required: true
        secret: false
        placeholder: 'e.g. Claude Official'

  - id: openai
    name: OpenAI
    baseUrl: https://api.openai.com/v1
    apiFormat: openai_chat
    needsApiKey: true
    websiteUrl: https://platform.openai.com
    modelsUrl: /v1/models
    modelsAuthStyle: bearer
    modelsDataPath: data
    fields:
      - key: name
        label: Provider Nickname
        required: true
        secret: false
        placeholder: 'e.g. My OpenAI'
      - key: apiKey
        label: API Key
        required: true
        secret: true
        placeholder: 'sk-...'
      - key: baseUrl
        label: Base URL (Optional)
        required: false
        secret: false
        default: https://api.openai.com/v1
        placeholder: 'https://api.openai.com/v1'

  - id: gemini
    name: Google Gemini
    baseUrl: https://generativelanguage.googleapis.com/v1beta/openai
    apiFormat: openai_chat
    needsApiKey: true
    websiteUrl: https://aistudio.google.com
    modelsUrl: /v1/models
    modelsAuthStyle: bearer
    modelsDataPath: data
    fields:
      - key: name
        label: Provider Nickname
        required: true
        secret: false
        placeholder: 'e.g. My Gemini'
      - key: apiKey
        label: API Key
        required: true
        secret: true
        placeholder: 'Gemini API Key'

  - id: mistral
    name: Mistral AI
    baseUrl: https://api.mistral.ai/v1
    apiFormat: openai_chat
    needsApiKey: true
    websiteUrl: https://console.mistral.ai
    modelsUrl: /v1/models
    modelsAuthStyle: bearer
    modelsDataPath: data
    fields:
      - key: name
        label: Provider Nickname
        required: true
        secret: false
        placeholder: 'e.g. My Mistral'
      - key: apiKey
        label: API Key
        required: true
        secret: true
        placeholder: 'Mistral API Key'

  - id: deepseek
    name: DeepSeek
    baseUrl: https://api.deepseek.com/anthropic
    apiFormat: anthropic
    needsApiKey: true
    websiteUrl: https://platform.deepseek.com
    # Models list follows OpenAI endpoint (no /v1/models under /anthropic)
    modelsUrl: https://api.deepseek.com/v1/models
    modelsAuthStyle: bearer
    modelsDataPath: data
    fields:
      - key: name
        label: Provider Nickname
        required: true
        secret: false
        placeholder: 'e.g. My DeepSeek'
      - key: apiKey
        label: API Key
        required: true
        secret: true
        placeholder: 'sk-...'

  - id: zhipuglm
    name: Zhipu GLM
    baseUrl: https://open.bigmodel.cn/api/paas/v4
    apiFormat: openai_chat
    needsApiKey: true
    websiteUrl: https://open.bigmodel.cn
    modelsUrl: /v4/models
    modelsAuthStyle: bearer
    modelsDataPath: data
    fields:
      - key: name
        label: Provider Nickname
        required: true
        secret: false
        placeholder: 'e.g. My GLM'
      - key: apiKey
        label: API Key
        required: true
        secret: true
        placeholder: 'Zhipu API Key (glm-5.1)'

  - id: kimi
    name: Kimi
    baseUrl: https://api.moonshot.ai/v1
    apiFormat: openai_chat
    needsApiKey: true
    websiteUrl: https://platform.moonshot.cn
    modelsUrl: /models
    modelsAuthStyle: bearer
    modelsDataPath: data
    fields:
      - key: name
        label: Provider Nickname
        required: true
        secret: false
        placeholder: 'e.g. My Kimi'
      - key: apiKey
        label: API Key
        required: true
        secret: true
        placeholder: 'Moonshot API Key (kimi-k2.6)'

  - id: minimax
    name: MiniMax
    baseUrl: https://api.minimax.io/v1
    apiFormat: openai_chat
    needsApiKey: true
    websiteUrl: https://platform.minimaxi.com
    modelsUrl: /models
    modelsAuthStyle: bearer
    modelsDataPath: data
    fields:
      - key: name
        label: Provider Nickname
        required: true
        secret: false
        placeholder: 'e.g. My MiniMax'
      - key: apiKey
        label: API Key
        required: true
        secret: true
        placeholder: 'MiniMax API Key (MiniMax-M2.7)'

  - id: custom
    name: Custom
    baseUrl: ''
    apiFormat: openai_chat
    needsApiKey: true
    websiteUrl: ''
    modelsUrl: /v1/models
    modelsAuthStyle: bearer
    modelsDataPath: data
    fields:
      - key: name
        label: Provider Nickname
        required: true
        secret: false
        placeholder: 'e.g. My Custom Provider'
      - key: baseUrl
        label: Base URL
        required: true
        secret: false
        placeholder: 'https://your-api-endpoint.com/v1'
      - key: apiKey
        label: API Key
        required: false
        secret: true
        placeholder: '(Optional) API Key'
